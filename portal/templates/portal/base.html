{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ABM TI — Portal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    {% block extra_css %}{% endblock %}
    <style>
        body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
        .portal-header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
        .portal-header .logo { height: 28px; max-width: 140px; }
        .portal-header .user { color: #8b949e; font-size: 13px; }
        .portal-header .user strong { color: #c9d1d9; }
        .portal-main { max-width: 720px; margin: 32px auto; padding: 0 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 24px; margin-bottom: 20px; }
        .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #e6edf3; }
        .form-control, .form-select { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; border-radius: 6px; padding: 8px 12px; font-size: 14px; }
        .form-control:focus, .form-select:focus { border-color: #0f62fe; box-shadow: 0 0 0 3px rgba(15,98,254,0.15); }
        .form-label { font-size: 13px; font-weight: 500; color: #8b949e; margin-bottom: 4px; }
        .btn-primary { background: #0f62fe; border: none; border-radius: 6px; padding: 10px 20px; font-weight: 500; font-size: 14px; }
        .btn-primary:hover { background: #0050e6; }
        .btn-outline { background: transparent; border: 1px solid #30363d; color: #b0b8c0; border-radius: 6px; padding: 6px 12px; font-size: 12px; text-decoration: none; }
        .btn-outline:hover { background: #21262d; color: #e6edf3; }
        .chamado-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #21262d; }
        .chamado-item:last-child { border-bottom: none; }
        .badge-aberto { background: rgba(15,98,254,0.12); color: #82b1ff; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
        .badge-andamento { background: rgba(184,92,0,0.12); color: #ffb04f; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
        .badge-resolvido { background: rgba(14,96,39,0.12); color: #6fdd8b; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
        .alert { border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>
    <header class="portal-header">
        <img src="{% static 'img/Logo_ABM_colorida.png' %}" alt="ABM TI" class="logo">
        <span class="user">{{ user.get_full_name|default:user.username }} &middot; <form method="post" action="{% url 'logout' %}" class="d-inline">{% csrf_token %}<button class="btn btn-sm text-muted p-0 border-0" style="font-size:12px;">Sair</button></form></span>
    </header>
    <main class="portal-main">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
