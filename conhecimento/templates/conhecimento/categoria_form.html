{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Editar Categoria - ABM TI{% endblock %}
{% block content %}
<div class="mb-3">
    <h1 class="page-title">Editar Categoria</h1>
    <p class="page-subtitle">{{ categoria.nome }}</p>
</div>
<div class="content-card" style="max-width: 500px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
                <a href="{% url 'conhecimento_list' %}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
